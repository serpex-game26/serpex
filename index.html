<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a1a">
<title>SLITHER 2026 ⚡</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap');

  :root {
    --neon-cyan: #00f5ff;
    --neon-pink: #ff006e;
    --neon-gold: #ffd700;
    --neon-green: #39ff14;
    --neon-purple: #bf00ff;
    --bg: #05050f;
    --panel: rgba(255,255,255,0.04);
    --glow-cyan: 0 0 20px #00f5ff88, 0 0 40px #00f5ff44;
    --glow-pink: 0 0 20px #ff006e88, 0 0 40px #ff006e44;
    --glow-gold: 0 0 20px #ffd70088, 0 0 40px #ffd70044;
  }

  * { margin:0; padding:0; box-sizing:border-box; touch-action:none; }

  body {
    background: var(--bg);
    font-family: 'Exo 2', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    color: white;
  }

  /* ─── SCREENS ─── */
  .screen { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; z-index:10; overflow:hidden; }
  .screen.active { display:flex; }
  #shop.screen { overflow-y:scroll !important; overflow-x:hidden !important; -webkit-overflow-scrolling:touch !important; touch-action:pan-y !important; }
  #shop.screen.active { display:flex; overflow-y:scroll !important; }

  /* ─── MENU ─── */
  #menu {
    background: radial-gradient(ellipse at 30% 20%, #0d1a3a 0%, #05050f 60%), url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2300f5ff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2.5rem, 10vw, 5rem);
    font-weight: 900;
    letter-spacing: 0.1em;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink), var(--neon-gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    animation: logoGlow 2s ease-in-out infinite alternate;
    margin-bottom: 0.2em;
  }

  @keyframes logoGlow {
    from { filter: drop-shadow(0 0 20px #00f5ff); }
    to { filter: drop-shadow(0 0 40px #ff006e); }
  }

  .subtitle {
    font-family: 'Orbitron', monospace;
    font-size: clamp(0.7rem, 3vw, 1rem);
    color: var(--neon-gold);
    letter-spacing: 0.4em;
    margin-bottom: 3rem;
    opacity: 0.8;
  }

  .snake-preview {
    width: 200px;
    height: 60px;
    margin-bottom: 2rem;
    position: relative;
  }

  /* Stats preview */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.8rem;
    margin-bottom: 2.5rem;
    width: min(380px, 90vw);
  }

  .stat-box {
    background: var(--panel);
    border: 1px solid rgba(0,245,255,0.2);
    border-radius: 12px;
    padding: 0.8rem;
    text-align: center;
    backdrop-filter: blur(10px);
  }

  .stat-box .val {
    font-family: 'Orbitron', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--neon-cyan);
    text-shadow: var(--glow-cyan);
  }

  .stat-box .lbl {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Buttons */
  .btn {
    font-family: 'Orbitron', monospace;
    font-size: clamp(0.8rem, 3vw, 1rem);
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 1rem 2.5rem;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .btn:hover::before, .btn:active::before { opacity: 1; }

  .btn-primary {
    background: linear-gradient(135deg, var(--neon-cyan), #0066ff);
    color: var(--bg);
    box-shadow: var(--glow-cyan);
    font-size: clamp(1rem, 4vw, 1.3rem);
    padding: 1.2rem 3rem;
    margin-bottom: 1rem;
  }

  .btn-secondary {
    background: var(--panel);
    border: 1px solid var(--neon-pink);
    color: var(--neon-pink);
    box-shadow: var(--glow-pink);
    margin-bottom: 0.8rem;
  }

  .btn:active { transform: scale(0.96); }

  /* ─── SKIN SELECTOR ─── */
  .skin-row {
    display: flex;
    gap: 0.8rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 2rem;
    width: min(380px, 90vw);
  }

  .skin-opt {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid transparent;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    position: relative;
  }

  .skin-opt.selected {
    border-color: var(--neon-gold);
    box-shadow: var(--glow-gold);
    transform: scale(1.1);
  }

  .skin-opt .lock-icon {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.7);
    border-radius: 50%;
    font-size: 1.2rem;
  }

  /* ─── HUD ─── */
  #hud {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 5;
  }

  .hud-top {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding: 0.8rem 1rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    background: linear-gradient(to bottom, rgba(5,5,15,0.9), transparent);
  }

  .score-panel {
    background: rgba(0,245,255,0.08);
    border: 1px solid rgba(0,245,255,0.3);
    border-radius: 12px;
    padding: 0.5rem 1rem;
    backdrop-filter: blur(10px);
  }

  .score-val {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.2rem, 5vw, 2rem);
    font-weight: 900;
    color: var(--neon-cyan);
    text-shadow: var(--glow-cyan);
  }

  .score-lbl {
    font-size: 0.6rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .rank-panel {
    text-align: right;
    background: rgba(255,215,0,0.08);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 12px;
    padding: 0.5rem 1rem;
    backdrop-filter: blur(10px);
  }

  .rank-val {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.2rem, 5vw, 2rem);
    font-weight: 900;
    color: var(--neon-gold);
    text-shadow: var(--glow-gold);
  }

  /* Power bar */
  .power-bar-container {
    position: absolute;
    bottom: 160px;
    left: 50%;
    transform: translateX(-50%);
    width: min(300px, 80vw);
  }

  .power-bar-bg {
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    overflow: hidden;
  }

  .power-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
    border-radius: 4px;
    transition: width 0.2s;
    box-shadow: 0 0 10px var(--neon-cyan);
  }

  .power-lbl {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.2em;
    text-align: center;
    margin-bottom: 0.3rem;
    text-transform: uppercase;
  }

  /* Active bonuses */
  .bonus-row {
    position: absolute;
    top: 90px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 0.5rem;
    pointer-events: none;
  }

  .bonus-badge {
    background: rgba(0,0,0,0.7);
    border-radius: 20px;
    padding: 0.3rem 0.7rem;
    font-size: 0.7rem;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    border: 1px solid;
    animation: fadeInDown 0.3s ease;
  }

  @keyframes fadeInDown {
    from { opacity:0; transform:translateY(-10px); }
    to { opacity:1; transform:translateY(0); }
  }

  /* Kill feed */
  .kill-feed {
    position: absolute;
    top: 90px;
    right: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    max-width: 180px;
  }

  .kill-msg {
    background: rgba(255,0,110,0.15);
    border: 1px solid rgba(255,0,110,0.4);
    border-radius: 8px;
    padding: 0.3rem 0.6rem;
    font-size: 0.65rem;
    color: var(--neon-pink);
    animation: fadeInRight 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
  }

  @keyframes fadeInRight {
    from { opacity:0; transform:translateX(20px); }
    to { opacity:1; transform:translateX(0); }
  }

  @keyframes fadeOut {
    to { opacity:0; }
  }

  /* Leaderboard overlay */
  .leaderboard {
    position: absolute;
    top: 90px;
    left: 1rem;
    width: 145px;
    background: rgba(5,5,15,0.88);
    border: 1px solid rgba(0,245,255,0.2);
    border-radius: 12px;
    backdrop-filter: blur(10px);
    overflow: hidden;
    transition: all 0.3s ease;
  }

  .lb-header {
    font-family: 'Orbitron', monospace;
    font-size: 0.58rem;
    color: var(--neon-gold);
    letter-spacing: 0.15em;
    text-align: center;
    padding: 0.45rem 0.7rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
    -webkit-user-select: none;
  }

  .lb-arrow { font-size: 0.5rem; transition: transform 0.3s; color: rgba(255,215,0,0.6); }
  .lb-header.open .lb-arrow { transform: rotate(180deg); }

  .lb-top3 { padding: 0 0.5rem 0.4rem; }

  .lb-extra {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
    padding: 0 0.5rem;
  }

  .lb-extra.open { max-height: 200px; padding-bottom: 0.4rem; }

  .lb-divider { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 0.2rem 0; }

  .lb-entry {
    display: flex;
    justify-content: space-between;
    font-size: 0.62rem;
    margin-bottom: 0.2rem;
    padding: 0.18rem 0.3rem;
    border-radius: 4px;
  }

  .lb-entry.me { background: rgba(0,245,255,0.12); color: var(--neon-cyan); font-weight: 600; }
  .lb-entry.top1 { color: #ffd700; }
  .lb-entry.top2 { color: #c0c0c0; }
  .lb-entry.top3 { color: #cd7f32; }

  /* Controls */
  .controls-area {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 150px;
    pointer-events: all;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    background: linear-gradient(to top, rgba(5,5,15,0.95), transparent);
  }

  .boost-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--neon-pink), #8b0000);
    border: 3px solid var(--neon-pink);
    box-shadow: var(--glow-pink);
    font-family: 'Orbitron', monospace;
    font-size: 0.6rem;
    font-weight: 700;
    color: white;
    letter-spacing: 0.1em;
    cursor: pointer;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    transition: transform 0.1s;
  }

  .boost-btn:active { transform: scale(0.92); }
  .boost-btn .icon { font-size: 1.8rem; }

  .skill-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    border: 2px solid;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    position: relative;
    user-select: none;
    -webkit-user-select: none;
    transition: transform 0.1s;
  }

  .skill-btn:active { transform: scale(0.9); }

  .skill-cd {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-family: 'Orbitron', monospace;
    font-weight: 700;
  }

  .skill-label {
    position: absolute;
    bottom: -18px;
    font-size: 0.55rem;
    color: rgba(255,255,255,0.5);
    white-space: nowrap;
  }

  /* ─── CANVAS ─── */
  #gameCanvas {
    position: absolute;
    inset: 0;
    display: block;
  }

  /* ─── GAME OVER ─── */
  #gameover {
    background: rgba(5,5,15,0.97);
    backdrop-filter: blur(20px);
  }

  .go-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2rem, 8vw, 4rem);
    font-weight: 900;
    color: var(--neon-pink);
    text-shadow: var(--glow-pink);
    margin-bottom: 0.3em;
    animation: shake 0.5s ease;
  }

  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-10px)}
    40%{transform:translateX(10px)}
    60%{transform:translateX(-8px)}
    80%{transform:translateX(8px)}
  }

  .go-stats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1rem;
    width: min(340px, 90vw);
    margin: 1.5rem 0;
  }

  .go-stat {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 1rem;
    text-align: center;
  }

  .go-stat .v {
    font-family: 'Orbitron', monospace;
    font-size: 1.8rem;
    font-weight: 900;
  }

  .go-stat .l {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ─── XP / LEVEL ─── */
  .xp-bar-container {
    width: min(380px, 90vw);
    margin-bottom: 1.2rem;
  }
  .xp-bar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.3rem;
  }
  .xp-level-badge {
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem;
    font-weight: 900;
    color: var(--neon-gold);
    text-shadow: var(--glow-gold);
    background: rgba(255,215,0,0.1);
    border: 1px solid rgba(255,215,0,0.4);
    border-radius: 20px;
    padding: 0.2rem 0.8rem;
  }
  .xp-text {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.4);
    font-family: 'Orbitron', monospace;
    letter-spacing: 0.1em;
  }
  .xp-bar-bg {
    height: 10px;
    background: rgba(255,255,255,0.08);
    border-radius: 5px;
    overflow: hidden;
    border: 1px solid rgba(255,215,0,0.2);
  }
  .xp-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--neon-gold), #ff8800);
    border-radius: 5px;
    transition: width 1s ease;
    box-shadow: 0 0 8px var(--neon-gold);
  }

  /* Level up animation */
  .levelup-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,140,0,0.1));
    border: 2px solid var(--neon-gold);
    border-radius: 20px;
    padding: 1.5rem 2.5rem;
    text-align: center;
    z-index: 100;
    animation: levelUpAnim 3s ease forwards;
    pointer-events: none;
  }
  .levelup-popup .lu-title {
    font-family: 'Orbitron', monospace;
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--neon-gold);
    text-shadow: var(--glow-gold);
  }
  .levelup-popup .lu-sub {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.7);
    margin-top: 0.3rem;
  }
  @keyframes levelUpAnim {
    0%   { opacity:0; transform:translate(-50%,-50%) scale(0.5); }
    15%  { opacity:1; transform:translate(-50%,-60%) scale(1.1); }
    70%  { opacity:1; transform:translate(-50%,-60%) scale(1); }
    100% { opacity:0; transform:translate(-50%,-70%) scale(0.9); }
  }

  /* ─── SAISON / BATTLE PASS ─── */
  #seasonScreen {
    background: radial-gradient(ellipse at 50% 0%, #1a0533 0%, #05050f 70%);
    overflow-y: scroll !important;
    overflow-x: hidden !important;
    -webkit-overflow-scrolling: touch !important;
    touch-action: pan-y !important;
    justify-content: flex-start !important;
    padding: 0;
  }

  .season-hero {
    width: 100%;
    background: linear-gradient(135deg, #1a0533, #0d1a3a);
    padding: 1.5rem 1rem 1rem;
    text-align: center;
    border-bottom: 1px solid rgba(191,0,255,0.3);
  }

  .season-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.2rem, 5vw, 2rem);
    font-weight: 900;
    background: linear-gradient(135deg, #bf00ff, #ff006e, #ffd700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.3rem;
  }

  .season-timer {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.5);
    margin-bottom: 1rem;
  }

  .season-xp-bar-container {
    width: min(400px, 95vw);
    margin: 0 auto;
  }

  .season-xp-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.3rem;
  }

  .season-level-badge {
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    font-weight: 900;
    color: #bf00ff;
    text-shadow: 0 0 10px #bf00ff88;
  }

  .season-xp-text {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.4);
    font-family: 'Orbitron', monospace;
  }

  .season-xp-bg {
    height: 12px;
    background: rgba(255,255,255,0.08);
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid rgba(191,0,255,0.3);
  }

  .season-xp-fill {
    height: 100%;
    background: linear-gradient(90deg, #bf00ff, #ff006e);
    border-radius: 6px;
    transition: width 1s ease;
    box-shadow: 0 0 10px #bf00ff88;
  }

  /* Battle Pass Track */
  .bp-track {
    width: min(420px, 95vw);
    margin: 0 auto;
    padding: 1rem;
  }

  .bp-track-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.2em;
    text-align: center;
    margin-bottom: 1rem;
  }

  .bp-row {
    display: flex;
    align-items: center;
    margin-bottom: 0.6rem;
    gap: 0.6rem;
  }

  .bp-level-num {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.3);
    width: 28px;
    text-align: center;
    flex-shrink: 0;
  }

  .bp-reward-card {
    flex: 1;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 0.7rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
    transition: all 0.3s;
  }

  .bp-reward-card.unlocked {
    border-color: #bf00ff;
    background: rgba(191,0,255,0.08);
    box-shadow: 0 0 15px rgba(191,0,255,0.2);
  }

  .bp-reward-card.claimed {
    border-color: var(--neon-green);
    background: rgba(57,255,20,0.06);
    opacity: 0.7;
  }

  .bp-reward-icon { font-size: 1.6rem; flex-shrink: 0; }
  .bp-reward-name { font-family: 'Orbitron', monospace; font-size: 0.7rem; font-weight: 700; color: white; }
  .bp-reward-desc { font-size: 0.6rem; color: rgba(255,255,255,0.4); margin-top: 0.1rem; }

  .bp-claim-btn {
    margin-left: auto;
    background: linear-gradient(135deg, #bf00ff, #ff006e);
    border: none;
    border-radius: 8px;
    color: white;
    font-family: 'Orbitron', monospace;
    font-size: 0.6rem;
    font-weight: 700;
    padding: 0.4rem 0.8rem;
